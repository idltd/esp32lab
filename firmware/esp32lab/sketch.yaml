# arduino-cli sketch profile — ESP32 Lab
#
# With this file present, arduino-cli can compile without --fqbn:
#   arduino-cli compile --profile default firmware/esp32lab
#
# First-time setup: run firmware/install-libraries.bat

profiles:
  default:
    fqbn: esp32:esp32:esp32dev
    platforms:
      - platform: esp32:esp32
        platform_index_url: https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
    libraries:
      - ArduinoJson
      - DHTesp
      - OneWire
      - DallasTemperature
      # ESPAsyncWebServer and AsyncTCP: installed via install-libraries.bat
      # (git-url install — not version-pinnable in sketch.yaml)
